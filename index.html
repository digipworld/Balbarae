<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balbarae | العلامة الشخصية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .gradient-text {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <nav class="p-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold gradient-text">BALBARAE</h1>
        <div class="space-x-reverse space-x-4">
            <a href="#about" class="hover:text-indigo-400">عني</a>
            <a href="#contact" class="bg-indigo-600 px-4 py-2 rounded-lg hover:bg-indigo-700">تواصل معي</a>
        </div>
    </nav>

    <section class="h-screen flex flex-col justify-center items-center text-center px-4">
        <h2 class="text-5xl md:text-7xl font-extrabold mb-6">مرحباً بك في عالم <span class="gradient-text">بالبرع</span></h2>
        <p class="text-gray-400 text-xl max-w-2xl">
            هنا نصنع المستقبل الرقمي. أنا متخصص في [أضف تخصصك هنا]، أساعد الأفراد والشركات على النمو من خلال الابتكار.
        </p>
        <div class="mt-10">
            <button class="bg-white text-black px-8 py-3 rounded-full font-bold hover:bg-gray-200 transition">استكشف أعمالي</button>
        </div>
    </section>

    <footer class="border-t border-gray-800 p-8 text-center text-gray-500">
        <p>&copy; 2026 Balbarae. جميع الحقوق محفوظة.</p>
    </footer>

</body>
</html>
