<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balbarae | Global Personal Brand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --font-en: 'Inter', sans-serif; --font-ar: 'Cairo', sans-serif; }
        body { font-family: var(--font-en); scroll-behavior: smooth; transition: all 0.3s ease; }
        body.rtl { font-family: var(--font-ar); direction: rtl; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-bg { background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent), radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.1), transparent); }
    </style>
</head>
<body class="bg-[#0b0f1a] text-white hero-bg min-h-screen">

    <nav class="fixed w-full z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass rounded-2xl px-6 py-3">
            <h1 class="text-2xl font-black tracking-tighter gradient-text">BALBARAE</h1>
            
            <div class="flex items-center gap-2 bg-white/5 p-1 rounded-xl">
                <button onclick="setLanguage('en')" id="btn-en" class="px-3 py-1 rounded-lg text-xs font-bold transition bg-indigo-600">EN</button>
                <button onclick="setLanguage('ar')" id="btn-ar" class="px-3 py-1 rounded-lg text-xs font-bold transition hover:bg-white/10">AR</button>
                <button onclick="setLanguage('tr')" id="btn-tr" class="px-3 py-1 rounded-lg text-xs font-bold transition hover:bg-white/10">TR</button>
            </div>
        </div>
    </nav>

    <section class="pt-40 pb-20 px-6">
        <div class="max-w-5xl mx-auto text-center">
            <span id="hero-tag" class="px-4 py-2 rounded-full glass text-sm font-bold text-indigo-400 mb-6 inline-block">Welcome to the Digital Excellence</span>
            <h2 id="hero-title" class="text-5xl md:text-8xl font-black mb-8 leading-tight">Crafting the <span class="gradient-text">Future</span> with Creativity.</h2>
            <p id="hero-desc" class="text-gray-400 text-xl md:text-2xl max-w-3xl mx-auto mb-12 leading-relaxed">
                I am <span class="text-white font-bold">Balbarae</span>, specialized in turning complex ideas into simple and stunning digital experiences.
            </p>
            <div class="flex flex-col md:flex-row justify-center gap-4">
                <a href="https://wa.me/YOURNUMBER" id="btn-main" class="bg-indigo-600 px-10 py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 shadow-lg shadow-indigo-500/20 transition">Start Project</a>
            </div>
        </div>
    </section>

    <footer class="py-12 border-t border-white/5 text-center">
        <p id="footer-text" class="text-gray-500 font-medium">© 2026 All rights reserved to <span class="text-white">Balbarae</span></p>
    </footer>

    <script>
        const translations = {
            en: {
                tag: "Welcome to the Digital Excellence",
                title: "Crafting the <span class='gradient-text'>Future</span> with Creativity.",
                desc: "I am <span class='text-white font-bold'>Balbarae</span>, specialized in turning complex ideas into simple and stunning digital experiences.",
                btn: "Start Project",
                footer: "© 2026 All rights reserved to <span class='text-white'>Balbarae</span>",
                dir: "ltr"
            },
            ar: {
                tag: "مرحباً بك في عالم التميز الرقمي",
                title: "نصنع <span class='gradient-text'>المستقبل</span> بلمسة إبداع.",
                desc: "أنا <span class='text-white font-bold'>بالبرع</span>، متخصص في تحويل الأفكار المعقدة إلى تجارب رقمية بسيطة ومبهرة.",
                btn: "ابدأ مشروعك",
                footer: "© 2026 جميع الحقوق محفوظة لـ <span class='text-white'>بالبرع</span>",
                dir: "rtl"
            },
            tr: {
                tag: "Dijital Mükemmelliğe Hoş Geldiniz",
                title: "Yaratıcılıkla <span class='gradient-text'>Geleceği</span> Şekillendiriyoruz.",
                desc: "Ben <span class='text-white font-bold'>Balbarae</span>, karmaşık fikirleri basit ve çarpıcı dijital deneyimlere dönüştürme konusunda uzmanım.",
                btn: "Projeye Başla",
                footer: "© 2026 Tüm hakları <span class='text-white'>Balbarae</span>'ye aittir",
                dir: "ltr"
            }
        };

        function setLanguage(lang) {
            const t = translations[lang];
            document.getElementById('hero-tag').innerText = t.tag;
            document.getElementById('hero-title').innerHTML = t.title;
            document.getElementById('hero-desc').innerHTML = t.desc;
            document.getElementById('btn-main').innerText = t.btn;
            document.getElementById('footer-text').innerHTML = t.footer;
            
            // Set direction
            document.body.dir = t.dir;
            if(t.dir === 'rtl') {
                document.body.classList.add('rtl');
            } else {
                document.body.classList.remove('rtl');
            }

            // Update buttons style
            ['en', 'ar', 'tr'].forEach(l => {
                const btn = document.getElementById(`btn-${l}`);
                if(l === lang) {
                    btn.classList.add('bg-indigo-600');
                    btn.classList.remove('hover:bg-white/10');
                } else {
                    btn.classList.remove('bg-indigo-600');
                    btn.classList.add('hover:bg-white/10');
                }
            });
        }
    </script>
</body>
</html>
